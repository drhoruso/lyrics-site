<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${page_title}</title>
  <style>
    :root {
      --bg: #0f0c12;
      --bg-2: #17121b;
      --panel: rgba(255,255,255,0.06);
      --panel-strong: rgba(255,255,255,0.1);
      --text: #f6f1f7;
      --muted: #cbbdcc;
      --faint: #9d8fa0;
      --accent: #e8b7c8;
      --accent-2: #b99ad9;
      --line: rgba(255,255,255,0.12);
      --shadow: 0 18px 48px rgba(0,0,0,0.38);
      --radius: 20px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(185,154,217,0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(232,183,200,0.14), transparent 30%),
        linear-gradient(180deg, #1a131d 0%, #110d14 35%, #0c0a0f 100%);
      line-height: 1.9;
      letter-spacing: 0.02em;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(12,10,15,0.1), rgba(12,10,15,0));
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 8px);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      margin-bottom: 26px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -10% -40% auto;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(232,183,200,0.18), transparent 65%);
      pointer-events: none;
    }

    .kicker {
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.95rem, 4vw, 3.15rem);
      line-height: 1.12;
      letter-spacing: 0.01em;
      font-weight: 800;
      text-wrap: balance;
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.1rem);
      max-width: 54rem;
    }

    .note {
      margin-top: 18px;
      padding: 14px 16px;
      border-left: 3px solid var(--accent);
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .toc {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 14px;
    }

    .toc a {
      display: inline-flex;
      align-items: center;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1.2;
      transition: background-color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .toc a:hover,
    .toc a:focus-visible {
      background: rgba(255,255,255,0.1);
      border-color: rgba(232,183,200,0.42);
      transform: translateY(-1px);
      outline: none;
    }

    .song-link-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .song-link {
      display: inline-flex;
      align-items: center;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
      line-height: 1.2;
      transition: background-color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .song-link:hover,
    .song-link:focus-visible {
      background: rgba(255,255,255,0.11);
      border-color: rgba(232,183,200,0.42);
      transform: translateY(-1px);
      outline: none;
    }

    .song-link-note {
      color: var(--faint);
      font-size: 0.88rem;
    }

    .grid {
      display: grid;
      gap: 22px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.035));
      box-shadow: var(--shadow);
      scroll-margin-top: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      background: linear-gradient(90deg, rgba(232,183,200,0.12), rgba(185,154,217,0.1));
      border-bottom: 1px solid var(--line);
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: 0.03em;
    }

    .section-mood {
      font-size: 0.9rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .rows {
      display: grid;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .row:last-child {
      border-bottom: none;
    }

    .cell {
      padding: 18px 20px;
      min-width: 0;
    }

    .cell.original {
      background: rgba(255,255,255,0.015);
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .cell.translation {
      background: rgba(255,255,255,0.03);
    }

    .line {
      white-space: pre-line;
      font-size: 1.02rem;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    .line.jp {
      color: #fff7fb;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      margin-bottom: 10px;
      padding: 3px 9px;
      color: var(--faint);
      font-size: 0.77rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
    }

    .instrumental {
      padding: 20px;
      color: var(--muted);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      font-style: italic;
      font-size: 1rem;
    }

    footer {
      margin-top: 26px;
      color: var(--faint);
      font-size: 0.9rem;
      text-align: center;
      padding: 0 10px;
    }

    @media (max-width: 820px) {
      .toc {
        gap: 8px;
        margin: 16px 0 12px;
      }

      .toc a {
        padding: 8px 11px;
        font-size: 0.84rem;
      }

      .song-link-wrap {
        gap: 8px;
        margin-top: 16px;
      }

      .song-link {
        padding: 8px 12px;
        font-size: 0.86rem;
      }

      .song-link-note {
        font-size: 0.8rem;
      }

      body {
        line-height: 1.85;
      }

      .wrap {
        width: min(calc(100% - 16px), var(--max));
        padding-top: 10px;
        padding-bottom: 44px;
      }

      .hero {
        padding: 20px 16px 18px;
        border-radius: 18px;
        margin-bottom: 18px;
      }

      .hero::before {
        width: 220px;
        height: 220px;
        inset: auto -18% -26% auto;
      }

      .kicker {
        font-size: 0.74rem;
        letter-spacing: 0.1em;
      }

      h1 {
        font-size: clamp(1.8rem, 8vw, 2.35rem);
        line-height: 1.14;
      }

      .subtitle {
        font-size: 0.98rem;
        line-height: 1.82;
      }

      .note {
        font-size: 0.93rem;
        line-height: 1.8;
        padding: 12px 13px;
      }

      .grid {
        gap: 16px;
      }

      .section {
        border-radius: 16px;
      }

      .section-head {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 12px 13px;
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        background: linear-gradient(90deg, rgba(31,22,35,0.92), rgba(41,29,49,0.88));
      }

      .section-title {
        font-size: 1rem;
      }

      .section-mood {
        white-space: normal;
        font-size: 0.84rem;
        line-height: 1.6;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .cell {
        padding: 13px 13px 14px;
      }

      .cell.original {
        border-right: none;
        border-bottom: 1px dashed rgba(255,255,255,0.08);
      }

      .cell.translation {
        background: rgba(255,255,255,0.045);
      }

      .line {
        font-size: 1rem;
        line-height: 1.9;
      }

      .meta {
        margin-bottom: 8px;
        font-size: 0.72rem;
      }

      .meta.mobile-hide {
        display: inline-flex;
      }

      .instrumental {
        padding: 15px 13px 16px;
        font-size: 0.97rem;
        line-height: 1.85;
      }

      footer {
        margin-top: 20px;
        font-size: 0.82rem;
      }
    }

    @media (max-width: 480px) {
      .wrap {
        width: min(calc(100% - 12px), var(--max));
      }

      .hero {
        padding: 18px 14px 16px;
      }

      .cell {
        padding-left: 12px;
        padding-right: 12px;
      }

      .line {
        font-size: 0.98rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="kicker">${kicker}</div>
      <h1><a href="${song_url}" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.18);">${title_ja} <span style="font-weight:500; opacity:0.72;">${title_en}</span></a></h1>
      <p class="subtitle">${subtitle_html}</p>
      <div class="note">${note_html}</div>
      <nav class="toc" aria-label="目次">
        ${toc_html}
      </nav>
      <div class="song-link-wrap">
        <a class="song-link" href="${song_url}" target="_blank" rel="noopener noreferrer">曲を聴く</a>
        <span class="song-link-note">${song_link_note}</span>
      </div>
    </section>

    <div class="grid">
${sections_html}
    </div>

    <footer>
      単一HTMLファイル・レスポンシブ対訳レイアウト・CSS内蔵<br>
      GitHub Pages などの静的ホスティングで、そのまま公開できます
    </footer>
  </main>
</body>
</html>
